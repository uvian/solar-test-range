name: Build AutoCAD Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET Framework
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet packages
      run: dotnet restore SolarTestRange.sln

    - name: Build
      run: dotnet build SolarTestRange.sln -c Release --no-restore

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SolarTestRange
        path: src/SolarTestRange/bin/Release/net472/SolarTestRange.dll

    - name: Create Release (tagged only)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: src/SolarTestRange/bin/Release/net472/SolarTestRange.dll
        generate_release_notes: true
