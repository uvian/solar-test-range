name: Build AutoCAD Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore SolarTestRange.sln

    - name: Build
      run: dotnet build SolarTestRange.sln -c Release --no-restore

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SolarTestRange
        path: src/SolarTestRange/bin/Release/net472/SolarTestRange.dll

    - name: Upload to Release (tagged only)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload v1.0.0 src/SolarTestRange/bin/Release/net472/SolarTestRange.dll --repo ${{ github.repository }} --clobber 2>/dev/null || echo "note: release upload skipped (permissions)"
