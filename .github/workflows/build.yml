name: Build AutoCAD Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore SolarTestRange.sln

    - name: Build
      run: dotnet build SolarTestRange.sln -c Release --no-restore

    - name: Create bundle package
      shell: pwsh
      run: |
        # 创建 .bundle 目录结构
        New-Item -ItemType Directory -Force -Path bundle\SolarTestRange.bundle\Contents
        Copy-Item src\SolarTestRange\bin\Release\net472\SolarTestRange.dll bundle\SolarTestRange.bundle\Contents\
        Copy-Item PackageContents.xml bundle\SolarTestRange.bundle\
        Copy-Item HUATU.lsp bundle\

        # 打包为 zip
        Compress-Archive -Path bundle\* -DestinationPath bundle\SolarTestRange.bundle.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SolarTestRange
        path: |
          src/SolarTestRange/bin/Release/net472/SolarTestRange.dll
          bundle/SolarTestRange.bundle.zip
          HUATU.lsp

    - name: Upload to Release (tagged only)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload v1.0.2 src/SolarTestRange/bin/Release/net472/SolarTestRange.dll --repo ${{ github.repository }} --clobber 2>/dev/null
        gh release upload v1.0.2 bundle/SolarTestRange.bundle.zip --repo ${{ github.repository }} --clobber 2>/dev/null
        gh release upload v1.0.2 HUATU.lsp --repo ${{ github.repository }} --clobber 2>/dev/null
        echo "release upload done"
